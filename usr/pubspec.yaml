name: smart_sakhi_app
description: A production-ready beauty service booking app with user/admin features, built in Flutter.

publish_to: 'none'

version: 1.0.0+1

environment:
  sdk: ^3.7.2

dependencies:
  flutter:
    sdk: flutter
  provider: ^6.1.1  # State management
  shared_preferences: ^2.3.2  # Local storage for auth persistence
  intl: ^0.19.0  # Date/time formatting
  geolocator: ^13.0.1  # Location services (mocked for filtering)
  flutter_local_notifications: ^18.0.1  # Notifications
  cupertino_icons: ^1.0.8

dev_dependencies:
  flutter_test:
    sdk: flutter
  flutter_lints: ^5.0.0

flutter:
  uses-material-design: true
  # Add assets if needed later (e.g., images for services)
  # assets:
  #   - assets/images/